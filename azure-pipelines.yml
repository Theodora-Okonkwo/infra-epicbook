trigger:
  - main

pool:
  name: linux-hosted-agent

variables:
  TF_VERSION: '1.6.0'

stages:
  - stage: Terraform
    jobs:
      - job: TerraformApply
        steps:

          - task: TerraformInstaller@1
            inputs:
              terraformVersion: $(TF_VERSION)

          - task: TerraformTaskV4@4
            displayName: 'Terraform Init'
            inputs:
              provider: 'azurerm'
              command: 'init'
              workingDirectory: '$(System.DefaultWorkingDirectory)'
              backendServiceArm: 'epicbook-arm-connection'
              backendAzureRmResourceGroupName: 'tfstate-rg'
              backendAzureRmStorageAccountName: 'tfstatetheodora123'
              backendAzureRmContainerName: 'tfstate'
              backendAzureRmKey: 'epicbook.tfstate'

          - script: |
              terraform import \
                -var="mysql_password=$(TF_VAR_mysql_password)" \
                azurerm_mysql_flexible_server.mysql \
                /subscriptions/1a79f85d-55e2-4ee6-9655-2fe8d86dc1cc/resourceGroups/epicbook-rg/providers/Microsoft.DBforMySQL/flexibleServers/epicbook-mysql-server || true
            displayName: 'Import MySQL into Terraform state'
            workingDirectory: '$(System.DefaultWorkingDirectory)'
            env:
              TF_VAR_mysql_password: $(TF_VAR_mysql_password)

          - task: TerraformTaskV4@4
            displayName: 'Terraform Plan'
            inputs:
              provider: 'azurerm'
              command: 'plan'
              workingDirectory: '$(System.DefaultWorkingDirectory)'
              environmentServiceNameAzureRM: 'epicbook-arm-connection'
            env:
              TF_VAR_mysql_password: $(TF_VAR_mysql_password)

          - task: TerraformTaskV4@4
            displayName: 'Terraform Apply'
            inputs:
              provider: 'azurerm'
              command: 'apply'
              workingDirectory: '$(System.DefaultWorkingDirectory)'
              environmentServiceNameAzureRM: 'epicbook-arm-connection'
              commandOptions: '-auto-approve'
            env:
              TF_VAR_mysql_password: $(TF_VAR_mysql_password)

          - script: |
              echo "##vso[task.setvariable variable=APP_PUBLIC_IP;isOutput=true]$(terraform output -raw app_public_ip)"
              echo "##vso[task.setvariable variable=MYSQL_FQDN;isOutput=true]$(terraform output -raw mysql_fqdn)"
            displayName: 'Export Terraform Outputs'
            name: tfOutputs